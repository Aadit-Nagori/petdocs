name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install uv
          uv sync

      - name: Run tests
        working-directory: backend
        run: |
          uv run manage.py test api --settings=petdocs.settings_test --verbosity=2
