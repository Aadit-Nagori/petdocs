<!DOCTYPE html>
<html>
<head><title>{% if object %}Edit {{ object.name }}{% else %}Add Pet{% endif %}</title></head>
<body>
    <h2>{% if object %}Edit {{ object.name }}{% else %}Add Pet{% endif %}</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save</button>
    </form>
    <a href="{% url 'pets:pet_list' %}">Cancel</a>
</body>
</html>
